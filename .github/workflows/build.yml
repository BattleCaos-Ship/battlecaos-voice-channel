name: Build & Push Docker Image

# Pipeline de DESPLIEGUE de este repo — SOLO desde main (main = producción).
# Flujo: tests (GATE de calidad) → APROBACIÓN de QA (environment 'qa' con required reviewers:
# pausa hasta que un humano apruebe) → build+push a DEV. NO hay un RG 'test' aparte: el
# seguimiento de QA se hace con Grafana/Loki/Prometheus sobre dev.
# La lógica real vive en battlecaos-infra (workflows reusables). Secrets requeridos en
# Settings → Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# (+ SONAR_TOKEN/SONAR_HOST_URL opcionales para el análisis Sonar del gate).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente destino"
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  # GATE de calidad: si los tests fallan, NO se aprueba ni se despliega nada.
  test:
    uses: BattleCaos-Ship/battlecaos-infra/.github/workflows/ci-test.yml@main
    with:
      service: voice-channel
    secrets: inherit

  # APROBACIÓN de QA: usa el GitHub Environment 'qa'. Si ese environment tiene "required
  # reviewers", GitHub PAUSA aquí hasta la aprobación humana. Si no está configurado, pasa
  # de largo (no rompe). Configúralo en Settings → Environments → 'qa' → Required reviewers.
  qa-aprobacion:
    needs: test
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - run: echo "QA aprobado — desplegando voice-channel a dev"

  build:
    needs: qa-aprobacion
    uses: BattleCaos-Ship/battlecaos-infra/.github/workflows/build-push-image.yml@main
    with:
      service: voice-channel
      environment: ${{ inputs.environment || 'dev' }}
    secrets: inherit
